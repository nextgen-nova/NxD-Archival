server.port=${SERVER_PORT:8080}
server.address=0.0.0.0
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,text/plain
server.compression.min-response-size=1024

# MongoDB
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/ampdb}
spring.data.mongodb.database=${MONGO_DATABASE:ampdb}
spring.data.mongodb.auto-index-creation=true

#  Collection names (change without recompiling)
mongo.collection.swift=${MONGO_COLLECTION_SWIFT:${MONGO_COLLECTION_MESSAGES:messages}}
mongo.collection.payloads=${MONGO_COLLECTION_PAYLOADS:payloads}
mongo.collection.users=${MONGO_COLLECTION_USERS:user_ency_pass}
mongo.collection.audit=${MONGO_COLLECTION_AUDIT:audit_logs}
mongo.collection.rawcopies=${MONGO_COLLECTION_RAW_COPIES:raw_copies}
mongo.collection.failures=${MONGO_COLLECTION_FAILURES:failures}
mongo.collection.mt-labels=${MONGO_COLLECTION_MT_LABELS:mt_lable}
mongo.collection.mx-labels=${MONGO_COLLECTION_MX_LABELS:mx-lable}
mongo.collection.dropdown-options=${MONGO_COLLECTION_DROPDOWN_OPTIONS:drop_down}
mongo.collection.export-jobs=${MONGO_COLLECTION_EXPORT_JOBS:export_jobs}
mongo.collection.export-job-locks=${MONGO_COLLECTION_EXPORT_JOB_LOCKS:export_job_locks}
mongo.collection.report-templates=${MONGO_COLLECTION_REPORT_TEMPLATES:report_templates}
mongo.collection.report-history=${MONGO_COLLECTION_REPORT_HISTORY:report_history}

#  JWT
jwt.secret=${JWT_SECRET:SwiftPlatformSecretKey2024!@#$%^&*()ABCDEF_MUST_BE_32_CHARS_MIN}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

#  CORS (comma-separated origins / patterns)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://172.18.19.254:3000,http://172.18.19.254:3001,http://172.18.19.254:3002,http://172.18.19.254:3003,http://172.18.19.254:3004}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://172.18.19.*:*}

# ?? Search defaults
search.default-page-size=${SEARCH_DEFAULT_PAGE_SIZE:20}
search.max-page-size=${SEARCH_MAX_PAGE_SIZE:500}
search.dropdown.document-id=${SEARCH_DROPDOWN_DOCUMENT_ID:search_dropdown_options}
search.dropdown.refresh-enabled=${SEARCH_DROPDOWN_REFRESH_ENABLED:true}
search.dropdown.refresh-interval-hours=${SEARCH_DROPDOWN_REFRESH_INTERVAL_HOURS:6}
search.dropdown.refresh-initial-delay-minutes=${SEARCH_DROPDOWN_REFRESH_INITIAL_DELAY_MINUTES:5}
search.export.excel-max-rows-per-sheet=${SEARCH_EXPORT_EXCEL_MAX_ROWS_PER_SHEET:1048575}
search.export.background-threshold=${SEARCH_EXPORT_BACKGROUND_THRESHOLD:1000}
search.export.use-gridfs=${SEARCH_EXPORT_USE_GRIDFS:true}
search.export.output-dir=${SEARCH_EXPORT_OUTPUT_DIR:${java.io.tmpdir}/swift-export-jobs}
search.export.job-poll-interval-ms=${SEARCH_EXPORT_JOB_POLL_INTERVAL_MS:8000}
search.export.dispatch-poll-interval-ms=${SEARCH_EXPORT_DISPATCH_POLL_INTERVAL_MS:5000}
search.export.dispatch-lock-timeout-seconds=${SEARCH_EXPORT_DISPATCH_LOCK_TIMEOUT_SECONDS:30}
search.export.max-records-per-file=${SEARCH_EXPORT_MAX_RECORDS_PER_FILE:500}
search.export.progress-save-interval=${SEARCH_EXPORT_PROGRESS_SAVE_INTERVAL:25}
# Export artifact cleanup:
# completed exports stay available after download and are deleted only by scheduled cleanup.
# set retention in days, for example 3 means auto-delete after 3 days.
search.export.cleanup-retention-days=${SEARCH_EXPORT_CLEANUP_RETENTION_DAYS:3}
search.export.cleanup-interval-hours=${SEARCH_EXPORT_CLEANUP_INTERVAL_HOURS:6}
search.export.cleanup-initial-delay-minutes=${SEARCH_EXPORT_CLEANUP_INITIAL_DELAY_MINUTES:30}
search.export.executor.core-pool-size=${SEARCH_EXPORT_EXECUTOR_CORE_POOL_SIZE:1}
search.export.executor.max-pool-size=${SEARCH_EXPORT_EXECUTOR_MAX_POOL_SIZE:1}
search.export.executor.queue-capacity=${SEARCH_EXPORT_EXECUTOR_QUEUE_CAPACITY:20}

#  Protected admin account
admin.protected-id=${ADMIN_PROTECTED_ID:ADMIN001}

#  Actuator
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info,metrics}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_DETAILS:always}
management.info.env.enabled=true
info.app.name=SWIFT Platform
info.app.version=2.0.0
info.app.description=Enterprise SWIFT Message Monitoring

#  Logging
logging.level.com.swift.platform=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.springframework.data.mongodb=${LOG_LEVEL_MONGO:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{30} - %msg%n

# ?? Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=${APP_TIMEZONE:UTC}
