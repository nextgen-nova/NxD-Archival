# ══════════════════════════════════════════════════════════════════════════════
#  SWIFT Platform — NGINX Configuration
#  File: /etc/nginx/conf.d/swift-platform.conf
#
#  Soft-coded values (replace before deploying):
#    __DOMAIN__       → your domain, e.g.  swift.mycompany.com
#    __SHELL_DIST__   → path to shell-app/dist,  e.g. /var/www/swift/shell
#    __SEARCH_DIST__  → path to mfe-search/dist, e.g. /var/www/swift/search
#    __USERMGMT_DIST__→ path to mfe-user-management/dist
#    __PROFILE_DIST__ → path to mfe-profile/dist
#    __API_HOST__     → backend host:port, e.g. 127.0.0.1:8080
#
#  Quick replace:
#    sed -i 's/__DOMAIN__/swift.mycompany.com/g' swift-platform.conf
#    sed -i 's|__SHELL_DIST__|/var/www/swift/shell|g' swift-platform.conf
#    ...etc
# ══════════════════════════════════════════════════════════════════════════════

upstream swift_backend {
    server __API_HOST__;
    keepalive 64;
}

# ── Shell App (port 3000 dist) ────────────────────────────────────────────────
server {
    listen 80;
    server_name __DOMAIN__;

    root __SHELL_DIST__;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable JS/CSS chunks
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── MFE remoteEntry files (no cache — always fresh) ───────────────────
    location /mfe-user-mgmt/ {
        alias __USERMGMT_DIST__/;
        add_header Access-Control-Allow-Origin *;
        location ~* remoteEntry\.js$ { expires -1; add_header Cache-Control "no-cache"; }
    }

    location /mfe-search/ {
        alias __SEARCH_DIST__/;
        add_header Access-Control-Allow-Origin *;
        location ~* remoteEntry\.js$ { expires -1; add_header Cache-Control "no-cache"; }
    }

    location /mfe-profile/ {
        alias __PROFILE_DIST__/;
        add_header Access-Control-Allow-Origin *;
        location ~* remoteEntry\.js$ { expires -1; add_header Cache-Control "no-cache"; }
    }

    # ── Backend API proxy ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://swift_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    location /actuator/ {
        proxy_pass         http://swift_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
